name: Sync main to main-low

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check if sync is needed
        id: check-sync
        run: |
          git fetch origin main main-low
          
          # Count commits: main-low...main (right = main only)
          COUNTS=$(git rev-list --left-right --count origin/main-low...origin/main)
          MAIN_ONLY=$(echo $COUNTS | cut -d' ' -f2)
          
          echo "main has $MAIN_ONLY commits not in main-low"
          
          if [ "$MAIN_ONLY" -gt 0 ]; then
            echo "SYNC_NEEDED=true" >> $GITHUB_OUTPUT
          else
            echo "main-low is up to date with main"
            echo "SYNC_NEEDED=false" >> $GITHUB_OUTPUT
          fi

      - name: Rebase main-low onto main
        if: steps.check-sync.outputs.SYNC_NEEDED == 'true'
        run: |
          git fetch origin main-low
          
          # Get list of commits unique to main-low (not in main)
          echo "Finding main-low specific commits..."
          MAIN_LOW_COMMITS=$(git rev-list origin/main..origin/main-low)
          
          if [ -z "$MAIN_LOW_COMMITS" ]; then
            echo "No main-low specific commits found, just reset to main"
            git checkout -b main-low origin/main
            git push -f origin main-low
          else
            echo "Found main-low specific commits:"
            echo "$MAIN_LOW_COMMITS"
            
            # Checkout main
            git checkout origin/main
            
            # Create new branch from main
            git checkout -b main-low-sync
            
            # Cherry-pick main-low specific commits (in order)
            for commit in $(echo "$MAIN_LOW_COMMITS" | tac); do
              echo "Cherry-picking $commit..."
              git cherry-pick $commit || {
                echo "Conflict detected, aborting..."
                git cherry-pick --abort
                echo "Falling back to reset --hard"
                git reset --hard origin/main
                break
              }
            done
            
            # Force push to main-low
            git push -f origin main-low-sync:main-low
          fi
          
          echo "✅ main-low synced with main, preserving it-bot specific commits"

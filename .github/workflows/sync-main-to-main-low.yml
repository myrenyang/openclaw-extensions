name: Sync main to main-low

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if sync is needed
        id: check-sync
        run: |
          git fetch origin main main-low
          
          # Count commits: main-low...main (right = main only)
          COUNTS=$(git rev-list --left-right --count origin/main-low...origin/main)
          MAIN_ONLY=$(echo $COUNTS | cut -d' ' -f2)
          
          echo "main has $MAIN_ONLY commits not in main-low"
          
          if [ "$MAIN_ONLY" -gt 0 ]; then
            echo "SYNC_NEEDED=true" >> $GITHUB_OUTPUT
          else
            echo "main-low is up to date with main"
            echo "SYNC_NEEDED=false" >> $GITHUB_OUTPUT
          fi

      - name: Create merge PR
        if: steps.check-sync.outputs.SYNC_NEEDED == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Check for existing open PRs
            const { data: existingPRs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:main`,
              base: 'main-low',
              state: 'open'
            });
            
            if (existingPRs.length > 0) {
              console.log('PR already exists:', existingPRs[0].number);
              return;
            }
            
            // Create merge PR (main -> main-low)
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'chore: merge main into main-low',
              body: [
                '## Auto-sync PR',
                '',
                'This PR merges latest changes from `main` into `main-low`.',
                '',
                '### What this does:',
                '- Merges all new commits from `main`',
                '- **Preserves all commits unique to `main-low`**',
                '- Creates a merge commit',
                '',
                '### Merge instructions:',
                '1. Review the changes',
                '2. Use **"Create a merge commit"** (NOT squash or rebase)',
                '3. This preserves main-low history and adds main commits',
                '',
                '### Triggered by:',
                '- Push to `main` branch',
                '',
                '---',
                '*This PR was created automatically by the sync-main-to-main-low workflow.*'
              ].join('\n'),
              head: 'main',
              base: 'main-low'
            });
            
            console.log('Created PR:', pr.number);
            console.log('PR URL:', pr.html_url);

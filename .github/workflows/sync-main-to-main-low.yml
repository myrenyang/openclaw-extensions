name: Sync main to main-low

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check if sync is needed
        id: check-sync
        run: |
          git fetch origin main main-low
          
          # Count commits: main-low...main (right = main only)
          COUNTS=$(git rev-list --left-right --count origin/main-low...origin/main)
          MAIN_ONLY=$(echo $COUNTS | cut -d' ' -f2)
          
          echo "main has $MAIN_ONLY commits not in main-low"
          
          if [ "$MAIN_ONLY" -gt 0 ]; then
            echo "SYNC_NEEDED=true" >> $GITHUB_OUTPUT
          else
            echo "main-low is up to date with main"
            echo "SYNC_NEEDED=false" >> $GITHUB_OUTPUT
          fi

      - name: Create rebase PR
        if: steps.check-sync.outputs.SYNC_NEEDED == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');
            
            // Checkout main-low and create rebase branch
            execSync('git fetch origin main-low');
            execSync('git checkout origin/main-low');
            
            const branchName = `sync-rebase-${Date.now()}`;
            execSync(`git checkout -b ${branchName}`);
            
            // Rebase onto main (preserves main-low commits)
            console.log('Rebasing onto main...');
            execSync('git fetch origin main');
            try {
              execSync('git rebase origin/main', { stdio: 'pipe' });
            } catch (err) {
              console.error('Rebase failed:', err.message);
              // Auto-resolve conflicts by taking main's version
              execSync('git rebase --abort || true');
              execSync('git reset --hard origin/main');
              console.log('Falling back to reset --hard');
            }
            
            // Push the rebase branch
            execSync(`git push origin ${branchName}`);
            console.log('Pushed branch:', branchName);
            
            // Check for existing PR
            const { data: existingPRs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branchName}`,
              base: 'main-low',
              state: 'open'
            });
            
            if (existingPRs.length > 0) {
              console.log('PR already exists:', existingPRs[0].number);
              return;
            }
            
            // Create PR
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'chore: rebase main-low onto main',
              body: [
                '## Auto-sync PR',
                '',
                'This PR rebases `main-low` onto `main` to sync changes.',
                '',
                '### What this does:',
                '- Preserves all commits unique to `main-low`',
                '- Replays them on top of latest `main`',
                '',
                '### Merge instructions:',
                '1. Review the changes',
                '2. Use "Rebase and merge" (not squash)',
                '3. This preserves main-low commit history',
                '',
                '### Triggered by:',
                '- Push to `main` branch',
                '',
                '---',
                '*This PR was created automatically by the sync-main-to-main-low workflow.*'
              ].join('\n'),
              head: branchName,
              base: 'main-low'
            });
            
            console.log('Created PR:', pr.number);
            console.log('PR URL:', pr.html_url);

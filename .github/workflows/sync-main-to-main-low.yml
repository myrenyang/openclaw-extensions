name: Sync main to main-low

on:
  push:
    branches:
      - main

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if sync is needed
        id: check-sync
        run: |
          git fetch origin main main-low
          
          # Count commits: main-low...main (left = main-low only, right = main only)
          COUNTS=$(git rev-list --left-right --count origin/main-low...origin/main)
          MAIN_ONLY=$(echo $COUNTS | cut -d' ' -f2)
          
          echo "main has $MAIN_ONLY commits not in main-low"
          
          # Sync needed if main has commits not in main-low
          if [ "$MAIN_ONLY" -gt 0 ]; then
            echo "SYNC_NEEDED=true" >> $GITHUB_OUTPUT
          else
            echo "SYNC_NEEDED=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check-sync.outputs.SYNC_NEEDED == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Check if there's already an open PR
            const { data: existingPRs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:main`,
              base: 'main-low',
              state: 'open'
            });
            
            if (existingPRs.length > 0) {
              console.log('PR already exists:', existingPRs[0].number);
              return;
            }
            
            // Create PR from main to main-low
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'chore: sync main to main-low',
              body: [
                '## Auto-sync PR',
                '',
                'This PR automatically syncs changes from `main` to `main-low` branch.',
                '',
                '### Triggered by:',
                '- Push to `main` branch',
                '',
                '### Changes:',
                'See the commit history for details.',
                '',
                '---',
                '*This PR was created automatically by the sync-main-to-main-low workflow.*'
              ].join('\n'),
              head: 'main',
              base: 'main-low'
            });
            
            console.log('Created PR:', pr.number);
            console.log('PR URL:', pr.html_url);

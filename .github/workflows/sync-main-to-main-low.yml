name: Sync main to main-low

on:
  push:
    branches:
      - main

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check if main-low branch exists
        run: |
          git fetch origin
          if ! git branch -r | grep -q origin/main-low; then
            echo "main-low branch does not exist, creating it..."
            git checkout -b main-low
            git push -u origin main-low
          else
            echo "main-low branch exists"
          fi

      - name: Check if sync is needed
        id: check-sync
        run: |
          git fetch origin main main-low
          
          # Check if main is ahead of main-low
          if git merge-base --is-ancestor origin/main-low origin/main; then
            echo "main is ahead of main-low, sync needed"
            echo "SYNC_NEEDED=true" >> $GITHUB_OUTPUT
          else
            echo "main-low is up to date with main"
            echo "SYNC_NEEDED=false" >> $GITHUB_OUTPUT
          fi

      - name: Create sync branch and PR
        if: steps.check-sync.outputs.SYNC_NEEDED == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');
            
            // Checkout main and create sync branch
            execSync('git fetch origin main');
            execSync('git checkout origin/main');
            
            const branchName = `sync-main-to-main-low-${Date.now()}`;
            execSync(`git checkout -b ${branchName}`);
            execSync(`git push origin ${branchName}`);
            
            console.log('Created branch:', branchName);
            
            // Create PR
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'chore: sync main to main-low',
              body: [
                '## Auto-sync PR',
                '',
                'This PR automatically syncs changes from `main` to `main-low` branch.',
                '',
                '### Triggered by:',
                '- Push to `main` branch',
                '',
                '### Changes:',
                'See the commit history for details.',
                '',
                '---',
                '*This PR was created automatically by the sync-main-to-main-low workflow.*'
              ].join('\n'),
              head: branchName,
              base: 'main-low'
            });
            
            console.log('Created PR:', pr.number);
            console.log('PR URL:', pr.html_url);
